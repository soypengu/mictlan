services:
  db:
    image: postgres:16-alpine
    container_name: mictlanarena-db
    environment:
      POSTGRES_DB: mictlanarena
      POSTGRES_USER: mictlan
      POSTGRES_PASSWORD: mictlan_password
    ports:
      - "55432:5432"
    volumes:
      - mictlanarena_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mictlan -d mictlanarena"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mictlanarena_pgdata:
